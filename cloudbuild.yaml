steps:
  # ===== BACKEND =====

  # 1. Build the Backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutripath-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutripath-backend:latest'
      - './backend'

  # 2. Push the Backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/nutripath-backend']

  # 3. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nutripath-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutripath-backend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=$_GEMINI_API_KEY,ALLOWED_ORIGINS=$_FRONTEND_URL'
      - '--memory'
      - '512Mi'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'

  # ===== FRONTEND =====

  # 4. Build the Frontend Docker image (inject backend URL at build time)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_API_URL=$_BACKEND_URL'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutripath-frontend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutripath-frontend:latest'
      - './frontend'

  # 5. Push the Frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/nutripath-frontend']

  # 6. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nutripath-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutripath-frontend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'

# Substitution variables — set via:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_GEMINI_API_KEY=xxx,_BACKEND_URL=https://nutripath-backend-xxx.run.app,_FRONTEND_URL=https://nutripath-frontend-xxx.run.app
substitutions:
  _GEMINI_API_KEY: 'mock'
  _BACKEND_URL: 'http://localhost:8080'
  _FRONTEND_URL: 'http://localhost:8081'

images:
  - 'gcr.io/$PROJECT_ID/nutripath-backend'
  - 'gcr.io/$PROJECT_ID/nutripath-frontend'

options:
  logging: CLOUD_LOGGING_ONLY
