steps:
  # 1. Install frontend dependencies and build
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
    dir: 'frontend'
    
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'frontend'

  # 2. Build the Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nutripath-backend', './backend']

  # 3. Push the Backend Image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nutripath-backend']

  # 4. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nutripath-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutripath-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# To deploy frontend (static files), typically you'd deploy to Firebase Hosting or Cloud Storage.
# For simplicity, we assume this pipeline focuses on the FastAPI backend on Cloud Run.

images:
  - 'gcr.io/$PROJECT_ID/nutripath-backend'
